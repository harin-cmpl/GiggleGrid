name: Deploy Photo Wall

on:
  push:
    branches: [main]
    paths:
      - "photowall/**"
      - ".github/workflows/deploy-photowall.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  deploy:
    name: Deploy Wall to S3 + CloudFront
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Inject config values
        run: |
          sed -i \
            -e 's|"__API_URL__"|"${{ vars.API_ENDPOINT }}"|g' \
            -e 's|SLIDE_DURATION_SECONDS: 10|SLIDE_DURATION_SECONDS: ${{ vars.SLIDE_DURATION_SECONDS || '10' }}|g' \
            photowall/config.js

      - name: Sync wall assets to shared frontend bucket
        run: |
          aws s3 sync photowall/ s3://${{ vars.FRONTEND_BUCKET }}/photowall \
            --delete \
            --cache-control "public, max-age=3600" \
            --exclude "*.map"

      - name: Set no-cache on wall config.js
        run: |
          aws s3 cp \
            s3://${{ vars.FRONTEND_BUCKET }}/photowall/config.js \
            s3://${{ vars.FRONTEND_BUCKET }}/photowall/config.js \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "application/javascript" \
            --metadata-directive REPLACE

      - name: Invalidate booth CloudFront (photowall path)
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/photowall/*"

      - name: Invalidate wall CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.PHOTOWALL_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
