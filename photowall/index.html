<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GiggleGrid Wall — Live Slideshow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <main class="wall-app">
    <div class="wall-glow wall-glow--left" aria-hidden="true"></div>
    <div class="wall-glow wall-glow--right" aria-hidden="true"></div>

    <header class="wall-header">
      <p class="wall-kicker">GiggleGrid Live Wall</p>
      <h1>Family Day Photo Wall</h1>
    </header>

    <section id="stage" class="stage" aria-live="polite">
      <article class="photo-card" data-slot="0" style="--tilt: -3deg; --offset-x: -20px; --offset-y: -15px; --z: 1">
        <img class="photo-img" alt="Wall photo" />
      </article>
      <article class="photo-card" data-slot="1" style="--tilt: 2deg; --offset-x: 20px; --offset-y: 10px; --z: 2">
        <img class="photo-img" alt="Wall photo" />
      </article>
      <article class="photo-card" data-slot="2" style="--tilt: -1deg; --offset-x: -10px; --offset-y: 20px; --z: 3">
        <img class="photo-img" alt="Wall photo" />
      </article>
    </section>

    <p id="status" class="status">Loading live photos...</p>
  </main>

  <script type="module" src="src/app.js"></script>
</body>
</html>
